<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHA POS V21</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; color: #000; }
        body { background: #f0f2f5; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; background: #fff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { background: #1e3a8a; color: #fff; padding: 12px; text-align: center; }
        header h1 { margin: 0; font-size: 18px; color: #fff; }
        .nav { display: flex; background: #ddd; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #1e3a8a; }
        .nav button { flex: 1; padding: 14px; border: none; background: #ddd; cursor: pointer; font-size: 12px; font-weight: bold; }
        .nav button.active { background: #fff; color: #1e3a8a; border-bottom: 3px solid #1e3a8a; }
        .section { padding: 15px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #bbb; border-radius: 4px; font-size: 15px; }
        .row { display: flex; gap: 5px; background: #f9f9f9; padding: 10px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 5px; align-items: center; }
        .row select { flex: 2; }
        .row input { flex: 1; min-width: 50px; }
        .btn-main { background: #1e3a8a; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-add { background: #10b981; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 6px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        
        /* Invoice Styling - သေချာပြင်ထားသည် */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .inv-box { background: #e6f2ff; padding: 20px; width: 100%; max-width: 360px; border-radius: 2px; }
        .inv-table { width: 100%; border-collapse: collapse; border: 1px solid #000; margin: 10px 0; }
        .inv-table th, .inv-table td { border: 1px solid #000 !important; padding: 6px; color: #000; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>မိုးထက်အောင်</h1></header>
        <div class="nav">
            <button onclick="showTab('s')" id="ts" class="active">အရောင်း</button>
            <button onclick="showTab('i')" id="ti">စတော့/ဈေး</button>
            <button onclick="showTab('r')" id="tr">မှတ်တမ်း</button>
            <button onclick="showTab('p')" id="tp">ပစ္စည်းသစ်</button>
        </div>

        <div id="s" class="section">
            <div class="card">
                <input id="cName" placeholder="ဝယ်သူအမည်">
                <input id="cGate" placeholder="ဂိတ်/လိပ်စာ">
            </div>
            <div id="cart"></div>
            <button class="btn-add" onclick="addOne()">+ ပစ္စည်းထပ်ထည့်ရန်</button>
            <button class="btn-main" onclick="sell()">ဘောက်ချာသိမ်းမည်</button>
        </div>

        <div id="i" class="section hidden">
            <div id="eb" class="card hidden" style="border:3px solid #1e3a8a">
                <h3 id="et" style="margin-top:0"></h3>
                <label><small>လက်ကျန်</small></label><input type="number" id="eq">
                <label><small>ဈေးနှုန်း</small></label><input type="number" id="ep">
                <button class="btn-main" onclick="saveE()">သိမ်းမည်</button>
                <button onclick="hideE()" style="width:100%; padding:10px; background:none; border:none;">ပိတ်မည်</button>
            </div>
            <div class="card" style="overflow-x:auto">
                <table id="itb-wrap"><thead><tr style="background:#eee"><th>အမည်</th><th>စတော့</th><th>ဈေး</th><th>ပြင်</th></tr></thead><tbody id="itb"></tbody></table>
            </div>
        </div>

        <div id="r" class="section hidden">
            <div class="card"><table><thead><tr style="background:#eee"><th>ဝယ်သူ</th><th>စုစုပေါင်း</th><th>Action</th></tr></thead><tbody id="rtb"></tbody></table></div>
        </div>

        <div id="p" class="section hidden">
            <div class="card">
                <input id="nn" placeholder="ပစ္စည်းအမည်သစ်">
                <button class="btn-add" onclick="addNew()">ထည့်မည်</button>
            </div>
            <div class="card"><table><thead><tr style="background:#eee"><th>အမည်</th><th>ဖျက်</th></tr></thead><tbody id="ntb"></tbody></table></div>
        </div>

        <div id="modal" class="modal">
            <div id="inv-card" class="inv-box">
                <div style="text-align:center">
                    <h2 style="margin:0; font-size:20px;">မိုးထက်အောင်</h2>
                    <p style="font-size:11px; margin:3px 0;">Ph: 09-740878785, 09-970609758</p>
                </div>
                <hr style="border:0.5px solid #000; margin:10px 0;">
                <div id="inv-head" style="font-size:12px; line-height:1.5; margin-bottom:8px;"></div>
                <div id="inv-body"></div>
                <div style="text-align:center; margin-top:10px; font-size:11px;">
                    <p style="margin:0">Kpay: 09750370777 (U Htet Myat Naing)</p>
                    <b style="font-size:13px;">ဝယ်ယူအားပေးမှုကို ကျေးဇူးတင်ပါသည်</b>
                </div>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px; width:100%; max-width:350px;">
                <button class="btn-add" onclick="saveImg()" style="margin:0">Gallery သိမ်းမည်</button>
                <button onclick="document.getElementById('modal').style.display='none'" style="background:#555; color:#fff; border:none; padding:12px; border-radius:6px; flex:1">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const kArr = ['mha_v21_items','mha_v20_items','mha_v16_items','mha_v15_items'];
        const sArr = ['mha_v21_sales','mha_v20_sales','mha_v16_sales','mha_v15_sales'];

        let items = [];
        for(let k of kArr) { let d = localStorage.getItem(k); if(d && JSON.parse(d).length > 0) { items = JSON.parse(d); break; } }
        let sales = [];
        for(let k of sArr) { let d = localStorage.getItem(k); if(d && JSON.parse(d).length > 0) { sales = JSON.parse(d); break; } }

        let ei = null;

        function saveAll() {
            const is = JSON.stringify(items); const ss = JSON.stringify(sales);
            kArr.forEach(k => localStorage.setItem(k, is));
            sArr.forEach(k => localStorage.setItem(k, ss));
        }

        function showTab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.remove('hidden');
            document.getElementById('t'+t).classList.add('active');
            if(t==='i') renderI(); if(t==='r') renderR(); if(t==='p') renderP();
        }

        function addOne() {
            const div = document.createElement('div'); div.className = 'row';
            let opt = items.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
            div.innerHTML = `<select onchange="const x=items.find(f=>f.name===this.value); if(x) this.parentElement.querySelector('.p').value=x.price;"><option value="">--ရွေး--</option>${opt}</select><input type="number" class="p" placeholder="ဈေး"><input type="number" class="q" placeholder="ခု"><b onclick="this.parentElement.remove()" style="color:red; font-size:20px; padding:0 5px; cursor:pointer">×</b>`;
            document.getElementById('cart').appendChild(div);
        }

        function sell() {
            const rows = document.querySelectorAll('.row');
            let s = { id: Date.now(), cn: document.getElementById('cName').value, cg: document.getElementById('cGate').value, list: [], gt: 0 };
            rows.forEach(r => {
                const n = r.querySelector('select').value;
                const p = parseFloat(r.querySelector('.p').value) || 0;
                const q = parseInt(r.querySelector('.q').value) || 0;
                if(n && q > 0) {
                    const db = items.find(i => i.name === n);
                    if(db && db.qty >= q) {
                        db.qty -= q;
                        s.list.push({n,p,q,t:p*q});
                        s.gt += (p*q);
                    } else { alert(n + " စတော့မလောက်ပါ"); }
                }
            });
            if(s.list.length > 0) { sales.push(s); saveAll(); alert("ဘောက်ချာ သိမ်းပြီးပါပြီ"); location.reload(); }
        }

        function renderI() {
            document.getElementById('itb').innerHTML = items.map((i,idx) => `<tr><td>${i.name}</td><td><b>${i.qty}</b></td><td>${i.price}</td><td><button onclick="editI(${idx})">ပြင်</button></td></tr>`).join('');
        }
        function editI(idx) { ei=idx; document.getElementById('et').innerText=items[idx].name; document.getElementById('eq').value=items[idx].qty; document.getElementById('ep').value=items[idx].price; document.getElementById('eb').classList.remove('hidden'); window.scrollTo(0,0); }
        function saveE() { items[ei].qty=parseInt(document.getElementById('eq').value)||0; items[ei].price=parseFloat(document.getElementById('ep').value)||0; saveAll(); renderI(); hideE(); }
        function hideE() { document.getElementById('eb').classList.add('hidden'); }

        function renderR() {
            document.getElementById('rtb').innerHTML = sales.map((s,idx) => `<tr><td><b>${s.cn||'-'}</b><br><small>${s.list.length} မျိုး</small></td><td>${s.gt.toLocaleString()}</td><td><button onclick="viewV(${s.id})">ကြည့်</button> <button onclick="delS(${idx})" style="color:red">×</button></td></tr>`).reverse().join('');
        }
        
        // ဘောက်ချာကြည့်သည့်နေရာ (အဓိကပြင်ထားသည့်နေရာ)
        function viewV(id) {
            const s = sales.find(x => x.id === id); if(!s) return;
            document.getElementById('inv-head').innerHTML = `ဝယ်သူ: <b>${s.cn || '-'}</b><br>ဂိတ်/လိပ်စာ: ${s.cg || '-'}`;
            
            // ဤနေရာတွင် list တစ်ခုလုံးကို loop ပတ်၍ ဇယားထဲထည့်သည်
            let rowsHtml = "";
            s.list.forEach((it, index) => {
                rowsHtml += `<tr>
                    <td align="center">${index + 1}</td>
                    <td>${it.n}</td>
                    <td align="center">${it.q}</td>
                    <td align="right">${it.p.toLocaleString()}</td>
                    <td align="right">${it.t.toLocaleString()}</td>
                </tr>`;
            });

            document.getElementById('inv-body').innerHTML = `
                <table class="inv-table">
                    <tr style="background:#bcd9ff">
                        <th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th>
                    </tr>
                    ${rowsHtml}
                    <tr style="background:#bcd9ff">
                        <td colspan="4" align="right">စုစုပေါင်း</td>
                        <td align="right"><b>${s.gt.toLocaleString()}</b></td>
                    </tr>
                </table>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function delS(idx) { if(confirm("ဖျက်မှာလား?")){ sales[idx].list.forEach(l=>{const d=items.find(i=>i.name===l.n); if(d)d.qty+=l.q;}); sales.splice(idx,1); saveAll(); renderR(); }}
        function addNew() { const n=document.getElementById('nn').value; if(n){ items.push({name:n,qty:0,price:0}); saveAll(); renderP(); document.getElementById('nn').value=''; }}
        function renderP() { document.getElementById('ntb').innerHTML = items.map((i,idx) => `<tr><td>${i.name}</td><td><button onclick="items.splice(${idx},1); saveAll(); renderP();">ဖျက်</button></td></tr>`).join(''); }
        function saveImg() { html2canvas(document.getElementById('inv-card')).then(c => { const a=document.createElement('a'); a.href=c.toDataURL(); a.download='MHA-Invoice.png'; a.click(); }); }
        
        window.onload = () => { addOne(); };
    </script>
</body>
</html>
